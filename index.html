<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 나의 진로 유형 탐색 퀴즈</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>나의 진로 유형 알아보기 🕵️‍♂️</h1>
            <p>나와 가장 잘 맞는 직업 분야는 무엇일까? 간단한 퀴즈로 알아보자!</p>
        </header>

        <main id="quiz-container">
            <div id="question-box">
                <h2 id="question">질문이 여기에 표시됩니다.</h2>
            </div>
            <div id="answer-buttons" class="btn-grid">
                </div>
        </main>

        <section id="result-container" class="hide">
            <h2>🎉 퀴즈 완료! 🎉</h2>
            <div id="result-content">
                <h3 id="result-title">나의 유형</h3>
                <p id="result-desc">유형에 대한 설명이 여기에 표시됩니다.</p>
            </div>
            <button id="restart-btn" class="restart-btn">처음부터 다시하기</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
